version: '3.8'

services:
  # 1. قاعدة بيانات بوستغري (PostgreSQL) - معزولة بالكامل داخلياً
  postgres:
    image: postgres:16-alpine
    container_name: analytics_postgres
    # حذفنا البورت الخارجي كرمال الأمان، الحاويات بتتصل داخلياً عبر بورت 5432
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-LiveAnalyticsDb}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - analytics_network

  # 2. خدمة الريديس (Redis) - معزولة بالكامل داخلياً
  redis:
    image: redis:alpine
    container_name: analytics_redis
    # حذفنا البورت الخارجي للأمان
    restart: always
    networks:
      - analytics_network

  # 3. خدمة الباك إند (.NET 10) - مربوطة بالشبكتين
  backend:
    image: analytics_backend
    container_name: analytics_backend_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ملاحظة: بالـ Connection String غيرنا Host=postgres لـ Host=analytics_postgres (اسم الكونتينر الصريح)
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      Redis__ConnectionString: "${REDIS_CONNECTION_STRING:-analytics_redis:6379,abortConnect=false}"
      ConnectionStrings__EventStore: "${EVENT_STORE_CONNECTION:-Host=analytics_postgres;Port=5432;Database=LiveAnalyticsDb;Username=postgres;Password=postgres}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - analytics_network # للاتصال بقاعدة البيانات والريديس
      - proxy-network    # كرمال NPM يقدر يشوف الـ API

  # 4. خدمة الفرونت إند (React + Vite) - مربوطة بالشبكتين
  frontend:
    image: analytics_frontend
    container_name: analytics_frontend_app
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: always
    networks:
      - analytics_network
      - proxy-network    # كرمال NPM يشوف تطبيق الـ React ويفتحه للمستخدمين

volumes:
  postgres_data:

networks:
  analytics_network:
    driver: bridge
  proxy-network:         # الشبكة الخارجية المشتركة مع Nginx Proxy Manager
    external: true