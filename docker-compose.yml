version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: analytics_postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-LiveAnalyticsDb}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    networks:
      - analytics_network

  redis:
    image: redis:alpine
    container_name: analytics_redis
    restart: always
    networks:
      - analytics_network

  backend:
    image: analytics_backend
    container_name: analytics_backend_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      Redis__ConnectionString: "${REDIS_CONNECTION_STRING:-analytics_redis:6379,abortConnect=false}"
      ConnectionStrings__EventStore: "${EVENT_STORE_CONNECTION:-Host=analytics_postgres;Port=5432;Database=LiveAnalyticsDb;Username=postgres;Password=postgres}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - analytics_network 
      - apps-network    

  frontend:
    image: analytics_frontend
    container_name: analytics_frontend_app
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: always
    networks:
      - analytics_network
      - apps-network    

volumes:
  postgres_data:

networks:
  analytics_network:
    driver: bridge
  apps-network:         
    external: true